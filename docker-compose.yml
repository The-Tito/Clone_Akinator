services:
  db:
    image: postgres:16-alpine
    container_name: akinator_db
    restart: always
    environment:
      POSTGRES_USER: akinator
      POSTGRES_PASSWORD: akinator123
      POSTGRES_DB: akinator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
